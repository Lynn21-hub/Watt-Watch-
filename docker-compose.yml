services:
  mysql:
    image: mysql:8.0
    container_name: wattwatch_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: my_database

    ports:
      - "3306:3306"
    volumes:
    - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    - db-data:/var/lib/mysql
    - db-data:/var/log/mysql
volumes: 
  db-data:
